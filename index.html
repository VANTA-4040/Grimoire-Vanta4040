<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grimoire</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background-color: #0d1117;
        }
        object, embed, iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <!-- Utilisation de la balise <object> avec l'option view=FitH pour ajuster la largeur -->
    <object data="Grimory.pdf#view=FitH&pagemode=thumbs" type="application/pdf">
        <embed src="Grimory.pdf#view=FitH&pagemode=thumbs" type="application/pdf" />
    </object>

</body>
</html>
